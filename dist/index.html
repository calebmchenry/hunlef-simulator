<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:" />
    <title>Corrupted Hunlef Simulator</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a0a0a;
        color: #e0d0c0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 20px;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      #game-container {
        display: none;
        flex-direction: row;
        gap: 16px;
        align-items: flex-start;
      }
      #canvas-wrapper {
        position: relative;
      }
      canvas {
        border: 2px solid #4a2020;
        cursor: pointer;
        display: block;
      }
      #right-panel {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: stretch;
        width: 249px;
      }
      #hud {
        width: 249px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #2a1515;
        border: 1px solid #4a2020;
        border-radius: 4px;
        padding: 12px;
      }
      #side-panel {
        width: 249px;
      }
      .bar-container {
        width: 100%;
      }
      .bar-label {
        font-size: 12px;
        margin-bottom: 2px;
        display: flex;
        justify-content: space-between;
      }
      .bar-outer {
        height: 18px;
        background: #333;
        border-radius: 3px;
        overflow: hidden;
      }
      .bar-inner {
        height: 100%;
        transition: width 0.1s;
        border-radius: 3px;
      }
      .bar-hp .bar-inner { background: #22aa22; }
      .bar-prayer .bar-inner { background: #22aacc; }
      .bar-boss .bar-inner { background: #cc3333; }
      #prayer-indicator {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #prayer-indicator img {
        width: 32px;
        height: 32px;
        image-rendering: pixelated;
      }
      .prayer-icon { opacity: 0.4; }
      .prayer-icon.active { opacity: 1.0; }
      #attack-info, #tick-info {
        font-size: 13px;
      }
      /* Loadout screen */
      #loadout-screen {
        background: #2a1515;
        border: 1px solid #4a2020;
        border-radius: 8px;
        padding: 24px;
        min-width: 400px;
      }
      #loadout-screen h1 {
        text-align: center;
        color: #ff8844;
        margin-bottom: 16px;
        font-size: 22px;
      }
      .loadout-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .loadout-row label {
        font-size: 14px;
      }
      .loadout-row select {
        padding: 4px 8px;
        background: #1a0a0a;
        color: #e0d0c0;
        border: 1px solid #4a2020;
        border-radius: 3px;
        font-size: 13px;
      }
      #dps-preview {
        margin-top: 12px;
        padding: 10px;
        background: #1a0a0a;
        border-radius: 4px;
        font-size: 13px;
        line-height: 1.6;
      }
      #start-btn {
        display: block;
        width: 100%;
        margin-top: 16px;
        padding: 10px;
        background: #cc5522;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
      }
      #start-btn:hover { background: #ee6633; }
      /* Overlay */
      #overlay {
        display: none;
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.8);
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 12px;
        color: #e0d0c0;
        font-size: 18px;
        z-index: 10;
      }
      #overlay h2 { font-size: 28px; }
      #overlay .stats { font-size: 14px; line-height: 1.8; }
      #restart-btn {
        padding: 8px 24px;
        background: #cc5522;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
      }
      #restart-btn:hover { background: #ee6633; }
    </style>
    <script type="module" crossorigin src="/assets/index-CZOpeksF.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-J5HAzZLH.css">
  </head>
  <body>
    <div id="app">
      <div id="loadout-screen"></div>
      <div id="game-container">
        <div id="canvas-wrapper">
          <canvas id="game-canvas" width="576" height="576"></canvas>
          <div id="overlay">
            <h2 id="overlay-title"></h2>
            <div id="overlay-stats" class="stats"></div>
            <button id="restart-btn">Restart</button>
          </div>
        </div>
        <div id="right-panel">
          <div id="hud"></div>
          <div id="side-panel"></div>
        </div>
      </div>
    </div>
  </body>
</html>
